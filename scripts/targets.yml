# URLs below validated against a /map call on 2026-04-16.
# Cold-commented (#) targets were guesses that returned 404 and have been removed.
#
# Run:
#   node scripts/scrape.mjs                        # everything
#   node scripts/scrape.mjs --tier T1              # only official
#   node scripts/scrape.mjs --topic housing        # only housing
#   node scripts/scrape.mjs --kind scrape          # only single-page scrapes
#   node scripts/scrape.mjs --only wiesbaden       # substring match
#   node scripts/scrape.mjs --dry-run              # list without API calls

