# Each entry:
#   kind:    scrape | crawl | map | search
#   url:     required for scrape/crawl/map
#   query:   required for search
#   tier:    T1 (official) | T2 (semi-official) | T3 (community) | T4 (German-side)
#   topic:   housing | finance | medical | legal | vehicle | id-cac | family |
#            schools | pets | religious | mwr | unit | mixed
#   notes:   free text (optional)
#   limit:   crawl/map/search page cap (optional; default varies by kind)
#   includePaths / excludePaths: crawl path filters (glob-ish)
