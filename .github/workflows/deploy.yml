name: deploy
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_audit:
        description: "Skip the content-audit gate (use only for emergency deploys)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build site
        run: npm run build
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://example.github.io' }}
          SITE_BASE: ${{ vars.SITE_BASE || '/inpro' }}
          PUBLIC_REPO_URL: ${{ vars.PUBLIC_REPO_URL }}
          PUBLIC_FEEDBACK_EMAIL: ${{ vars.PUBLIC_FEEDBACK_EMAIL }}
      - name: Audit content (blocks deploy on errors; surfaces warnings in summary)
        # M-ip-02 fix (2026-04-25): audit failures block production deploys.
        # Override only via explicit workflow_dispatch input `skip_audit=true`.
        if: ${{ inputs.skip_audit != true }}
        env:
          SITE_BASE: ${{ vars.SITE_BASE || '/inpro' }}
        run: |
          set +e
          node scripts/audit-content.mjs --json > audit.json
          audit_exit=$?
          {
            echo '## Content audit'
            echo ''
            if [ -f audit.json ]; then
              count=$(jq -r '.count // 0' audit.json)
              total=$(jq -r '.issues | length' audit.json)
              errors=$(jq -r '[.issues[] | select(.level=="error")] | length' audit.json)
              warns=$(jq -r '[.issues[] | select(.level=="warn")] | length' audit.json)
              echo "- ${count} entries scanned"
              echo "- ${errors} errors Â· ${warns} warnings"
              if [ "$total" -gt 0 ]; then
                echo ''
                echo '<details><summary>Issue list</summary>'
                echo ''
                jq -r '.issues[] | "- [" + .level + "] " + .file + " â€” " + .msg' audit.json | head -50
                echo ''
                echo '</details>'
              fi
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit $audit_exit
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
