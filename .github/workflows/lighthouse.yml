name: lighthouse
on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

jobs:
  lhci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Build site (empty base path for LHCI's static server)
        run: npm run build
        env:
          SITE_URL: http://localhost
          SITE_BASE: ""

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@512cc908a55bfb0ad231facca52adf3d3a651df4  # v12
        with:
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Post / update PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const dir = '.lighthouseci';
            const lines = ['<!-- inpro-lhci-bot -->', '## Lighthouse CI', ''];

            try {
              const links = JSON.parse(fs.readFileSync(path.join(dir, 'links.json'), 'utf8'));
              const manifest = JSON.parse(fs.readFileSync(path.join(dir, 'manifest.json'), 'utf8'));

              const fmt = (n) => (n == null ? '—' : Math.round(n * 100));
              for (const m of manifest) {
                const summary = m.summary ?? {};
                const url = m.url.replace(/^https?:\/\/[^/]+/, '');
                const link = links[m.url] || '';
                lines.push(`- \`${url}\` · A11y ${fmt(summary.accessibility)} · Perf ${fmt(summary.performance)} · BP ${fmt(summary['best-practices'])} · SEO ${fmt(summary.seo)}${link ? ` · [report](${link})` : ''}`);
              }

              lines.push('');
              lines.push('_Targets: A11y ≥95 · Perf ≥90 · Best-Practices ≥90 · SEO ≥95. Warn-only — does not block merge._');
            } catch (e) {
              lines.push(`Could not read .lighthouseci output: ${e.message}`);
            }

            const body = lines.join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const existing = comments.data.find(c => c.body && c.body.startsWith('<!-- inpro-lhci-bot -->'));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
