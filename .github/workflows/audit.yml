name: audit
on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Run content audit
        id: audit
        env:
          SITE_BASE: ${{ vars.SITE_BASE || '/inpro' }}
        run: |
          set +e
          node scripts/audit-content.mjs --json > audit.json
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Verify external links
        id: links
        run: |
          set +e
          node scripts/verify-links.mjs > /dev/null
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Run unit tests
        id: tests
        run: |
          set +e
          if [ -f vitest.config.ts ] || [ -f vitest.config.js ]; then
            npx vitest run --reporter=default
            echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          else
            echo "exit_code=0" >> "$GITHUB_OUTPUT"
            echo "no-vitest" > tests-status.txt
          fi

      - name: Post / update PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const audit = JSON.parse(fs.readFileSync('audit.json', 'utf8'));
            let links = {};
            try { links = JSON.parse(fs.readFileSync('scripts/link-report.json', 'utf8')); } catch {}

            const errors = (audit.issues ?? []).filter(i => i.level === 'error');
            const warns  = (audit.issues ?? []).filter(i => i.level === 'warn');
            const broken = links.broken_list ?? [];

            const t = audit.thresholds ?? {};

            const lines = ['<!-- inpro-audit-bot -->', '## Content audit report', ''];
            lines.push(`**${audit.count ?? 0} entries** scanned · staleness: safety ${t.stale_safety ?? '?'}d · other ${t.stale_other ?? '?'}d · poc-volatile ${t.poc_stale ?? '?'}d`);
            lines.push('');

            if (errors.length === 0 && warns.length === 0 && broken.length === 0) {
              lines.push('✅ All checks pass.');
            } else {
              if (errors.length) {
                lines.push(`### ❌ ${errors.length} error(s)`);
                for (const e of errors.slice(0, 30)) lines.push(`- \`${e.file}\` — ${e.msg}`);
                if (errors.length > 30) lines.push(`- …${errors.length - 30} more`);
                lines.push('');
              }
              if (warns.length) {
                lines.push(`### ⚠️ ${warns.length} warning(s)`);
                for (const w of warns.slice(0, 30)) lines.push(`- \`${w.file}\` — ${w.msg}`);
                if (warns.length > 30) lines.push(`- …${warns.length - 30} more`);
                lines.push('');
              }
              if (broken.length) {
                lines.push(`### 🔗 ${broken.length} broken external link(s)`);
                for (const b of broken.slice(0, 20)) lines.push(`- \`${b.file}\` — ${b.url} (${b.status || b.error})`);
                if (broken.length > 20) lines.push(`- …${broken.length - 20} more`);
                lines.push('');
              }
              lines.push('_Warn-only check — does not block merge. Errors should be fixed before merging._');
            }

            const body = lines.join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const existing = comments.data.find(c => c.body && c.body.startsWith('<!-- inpro-audit-bot -->'));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Surface in step summary
        if: always()
        run: |
          {
            echo '## Content audit'
            echo ''
            if [ -f audit.json ]; then
              jq -r '"- " + (.count|tostring) + " entries scanned"' audit.json || true
              jq -r '.issues | "- " + (length|tostring) + " issues"' audit.json || true
              jq -r '.issues[] | "  - [" + .level + "] " + .file + " — " + .msg' audit.json | head -50 || true
            fi
          } >> "$GITHUB_STEP_SUMMARY"
