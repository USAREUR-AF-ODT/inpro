name: content-audit
on:
  schedule:
    - cron: "0 13 * * 1"   # Mondays 13:00 UTC
  workflow_dispatch: {}

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Run content audit
        id: audit
        env:
          SITE_BASE: ${{ vars.SITE_BASE || '/inpro' }}
        run: |
          set +e
          node scripts/audit-content.mjs --json > audit.json
          echo "exit=$?" >> "$GITHUB_OUTPUT"

      - name: Verify source links
        id: links
        run: |
          set +e
          node scripts/verify-links.mjs || true

      # ── Weekly content refresh: ingest direct-fetchable targets, walk maps, recover errors. ──
      # ingest.mjs uses direct fetch first (free); only falls back to Firecrawl on empty/short
      # markdown. Skip-existing keeps cost bounded. If FIRECRAWL_API_KEY is unset, the fallback
      # raises and that target is logged as failed — direct-fetch successes still land.
      - name: Ingest direct-fetchable targets (T1)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: |
          set +e
          # Install html2text + poppler-utils for direct-fetch path
          sudo apt-get update -qq && sudo apt-get install -y -qq html2text poppler-utils
          node scripts/ingest.mjs --tier T1 --skip-existing
          echo "ingest_exit=$?" >> "$GITHUB_OUTPUT"

      - name: Walk discovered map URLs (second-pass)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: |
          set +e
          node scripts/scrape-from-maps.mjs --limit 30 || true

      - name: Recover stalled scrapes
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          set +e
          node scripts/fetch-html.mjs --from-errors || true

      - name: Open PR for new raw entries
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          branch: auto-ingest/weekly-content
          delete-branch: true
          commit-message: "chore(content): weekly auto-ingest of new raw entries"
          title: "chore(content): weekly auto-ingest"
          body: |
            Auto-generated by `content-audit` workflow.

            New / updated raw entries from:
            - `ingest.mjs --tier T1 --skip-existing` (direct fetch, Firecrawl fallback)
            - `scrape-from-maps.mjs --limit 30` (second-pass on discovered URLs)
            - `fetch-html.mjs --from-errors` (recovery for prior failures)

            See `scripts/ingest-report.json` and `scripts/maps-report.json` in this PR for counts.
          labels: |
            auto-ingest
            content-audit
          add-paths: |
            src/content/_raw/**
            scripts/ingest-report.json
            scripts/maps-report.json
            scripts/scrape-errors.json

      - name: Auto-flag stale safety entries (up to 5)
        id: autoflag
        run: |
          set -e
          node scripts/cron-flag-stale.mjs > flag-result.json
          cat flag-result.json
          echo "flagged_count=$(jq -r '.flagged | length' flag-result.json)" >> "$GITHUB_OUTPUT"

      - name: Open auto-PR for stale safety entries
        if: steps.autoflag.outputs.flagged_count != '0'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          branch: auto-deprecate/weekly-stale-safety
          delete-branch: true
          commit-message: "chore(audit): flag stale safety entries for re-verification"
          title: "chore(audit): flag ${{ steps.autoflag.outputs.flagged_count }} stale safety entries"
          body-path: flag-result.md
          labels: |
            auto-deprecate
            content-audit
          add-paths: src/content/published/**

      - name: Open / update audit issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let audit = {};
            try { audit = JSON.parse(fs.readFileSync('audit.json', 'utf8')); } catch {}
            const t = audit.thresholds ?? {};
            const stale = (audit.issues ?? []).filter(i => /stale|poc_volatile/.test(i.msg));
            const opsec = (audit.issues ?? []).filter(i => /OPSEC/.test(i.msg));
            const linkInternal = (audit.issues ?? []).filter(i => /broken (internal|topic) link/.test(i.msg));
            const safetyT1 = (audit.issues ?? []).filter(i => /missing T1 source/.test(i.msg));

            let links = {};
            try { links = JSON.parse(fs.readFileSync('scripts/link-report.json', 'utf8')); } catch {}
            const broken = links.broken_list ?? [];

            if (!stale.length && !broken.length && !opsec.length && !linkInternal.length && !safetyT1.length) {
              core.notice(`No issues.`);
              return;
            }

            const lines = ['## Weekly content audit', ''];
            lines.push(`Thresholds — safety stale ${t.stale_safety}d · other stale ${t.stale_other}d · poc_volatile ${t.poc_stale}d`);
            lines.push('');

            const section = (title, list, fmt = (i) => `\`${i.file}\` — ${i.msg}`) => {
              if (!list.length) return;
              lines.push(`### ${title} (${list.length})`);
              for (const item of list.slice(0, 50)) lines.push(`- ${fmt(item)}`);
              if (list.length > 50) lines.push(`- …${list.length - 50} more`);
              lines.push('');
            };

            section('Stale entries', stale);
            section('Safety topics missing T1', safetyT1);
            section('OPSEC flags', opsec);
            section('Broken internal links', linkInternal);
            section('Broken external links', broken, b => `\`${b.file}\` — ${b.url} (${b.status || b.error})`);

            const body = lines.join('\n');

            const { owner, repo } = context.repo;
            const existing = await github.rest.issues.listForRepo({
              owner, repo, labels: 'content-audit', state: 'open', per_page: 5,
            });
            if (existing.data[0]) {
              await github.rest.issues.update({
                owner, repo, issue_number: existing.data[0].number, body,
              });
              core.notice(`Updated existing audit issue #${existing.data[0].number}`);
            } else {
              const created = await github.rest.issues.create({
                owner, repo,
                title: `Weekly content audit — ${new Date().toISOString().slice(0,10)}`,
                body,
                labels: ['content-audit'],
              });
              core.notice(`Opened audit issue #${created.data.number}`);
            }
