name: content-audit
on:
  schedule:
    - cron: "0 13 * * 1"   # Mondays 13:00 UTC
  workflow_dispatch: {}

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Run content audit
        id: audit
        env:
          SITE_BASE: ${{ vars.SITE_BASE || '/inpro' }}
        run: |
          set +e
          node scripts/audit-content.mjs --json > audit.json
          echo "exit=$?" >> "$GITHUB_OUTPUT"

      - name: Verify source links
        id: links
        run: |
          set +e
          node scripts/verify-links.mjs || true

      - name: Auto-flag stale safety entries (up to 5)
        id: autoflag
        run: |
          set -e
          node scripts/cron-flag-stale.mjs > flag-result.json
          cat flag-result.json
          echo "flagged_count=$(jq -r '.flagged | length' flag-result.json)" >> "$GITHUB_OUTPUT"

      - name: Open auto-PR for stale safety entries
        if: steps.autoflag.outputs.flagged_count != '0'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: auto-deprecate/weekly-stale-safety
          delete-branch: true
          commit-message: "chore(audit): flag stale safety entries for re-verification"
          title: "chore(audit): flag ${{ steps.autoflag.outputs.flagged_count }} stale safety entries"
          body-path: flag-result.md
          labels: |
            auto-deprecate
            content-audit
          add-paths: src/content/published/**

      - name: Open / update audit issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let audit = {};
            try { audit = JSON.parse(fs.readFileSync('audit.json', 'utf8')); } catch {}
            const t = audit.thresholds ?? {};
            const stale = (audit.issues ?? []).filter(i => /stale|poc_volatile/.test(i.msg));
            const opsec = (audit.issues ?? []).filter(i => /OPSEC/.test(i.msg));
            const linkInternal = (audit.issues ?? []).filter(i => /broken (internal|topic) link/.test(i.msg));
            const safetyT1 = (audit.issues ?? []).filter(i => /missing T1 source/.test(i.msg));

            let links = {};
            try { links = JSON.parse(fs.readFileSync('scripts/link-report.json', 'utf8')); } catch {}
            const broken = links.broken_list ?? [];

            if (!stale.length && !broken.length && !opsec.length && !linkInternal.length && !safetyT1.length) {
              core.notice(`No issues.`);
              return;
            }

            const lines = ['## Weekly content audit', ''];
            lines.push(`Thresholds — safety stale ${t.stale_safety}d · other stale ${t.stale_other}d · poc_volatile ${t.poc_stale}d`);
            lines.push('');

            const section = (title, list, fmt = (i) => `\`${i.file}\` — ${i.msg}`) => {
              if (!list.length) return;
              lines.push(`### ${title} (${list.length})`);
              for (const item of list.slice(0, 50)) lines.push(`- ${fmt(item)}`);
              if (list.length > 50) lines.push(`- …${list.length - 50} more`);
              lines.push('');
            };

            section('Stale entries', stale);
            section('Safety topics missing T1', safetyT1);
            section('OPSEC flags', opsec);
            section('Broken internal links', linkInternal);
            section('Broken external links', broken, b => `\`${b.file}\` — ${b.url} (${b.status || b.error})`);

            const body = lines.join('\n');

            const { owner, repo } = context.repo;
            const existing = await github.rest.issues.listForRepo({
              owner, repo, labels: 'content-audit', state: 'open', per_page: 5,
            });
            if (existing.data[0]) {
              await github.rest.issues.update({
                owner, repo, issue_number: existing.data[0].number, body,
              });
              core.notice(`Updated existing audit issue #${existing.data[0].number}`);
            } else {
              const created = await github.rest.issues.create({
                owner, repo,
                title: `Weekly content audit — ${new Date().toISOString().slice(0,10)}`,
                body,
                labels: ['content-audit'],
              });
              core.notice(`Opened audit issue #${created.data.number}`);
            }
